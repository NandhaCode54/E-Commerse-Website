# Server Configuration
server.port=8080
spring.application.name=ecommerce-backend

# MySQL Database Configuration
# Credentials are read from environment variables in production; the values after
# the colon are dev-only fallbacks so the app still runs locally out of the box.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
# Schema is now owned by Flyway migrations (src/main/resources/db/migration).
# 'none' lets the app boot regardless of minor type nuances; switch to 'validate'
# once you've confirmed the schema matches the entities in your environment.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway migrations
spring.flyway.enabled=true
# Keep false so Flyway fails loudly on a pre-existing non-empty schema instead of
# silently skipping V1. IMPORTANT (first run): the old dev DB was created by
# Hibernate ddl-auto and does NOT match V1 - drop it once so Flyway builds clean:
#   mysql> DROP DATABASE ecommerce_db;
# (createDatabaseIfNotExist recreates it empty, then Flyway runs V1.)
spring.flyway.baseline-on-migrate=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.id.new_generator_mappings=true

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
# IMPORTANT: set a strong JWT_SECRET (>= 32 chars) via environment variable in any
# non-local environment. The fallback below is for local development only.
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatMustBeAtLeast256BitsLongForSecurityPurposes}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS - comma-separated list of allowed frontend origins (CRA dev = 3000, Vite dev = 5173)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

